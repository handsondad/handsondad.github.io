# Chirpy Theme Configuration
theme: jekyll-theme-chirpy
baseurl: ''
lang: zh-CN
timezone: Asia/Shanghai

title: Hands-on Dad
tagline: 专为奶爸打造的育儿宝藏网站
description: >-
  分享实用的育儿经验、科学的教育方法和温馨的亲子故事，帮助奶爸们从容育儿。

url: 'https://handsondad.github.io'

github:
  username: handsondad

twitter:
  username: handsondad

social:
  name: 奶爸-Liang
  email: liang@handsondad.com
  links:
    - https://twitter.com/handsondad
    - https://github.com/handsondad
    - https://instagram.com/handsondad

google_site_verification:

google_analytics:
  id: 'UA-XXXXXXXX-X'
  pv:
    proxy_endpoint:
    cache_path:

theme_mode:

img_cdn:

avatar: '/assets/images/logo.png'

social_preview_image:

toc: true

comments:
  active: 'utterances'
  utterances:
    repo: 'handsondad/handsondad.github.io'
    issue_term: 'pathname'
  giscus:
    repo:
    repo_id:
    category:
    category_id:
    mapping:
    input_position:
    lang:
    reactions_enabled:

assets:
  self_host:
    enabled:
    env:

pwa:
  enabled: true

paginate: 10

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ''
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ''
      type: tabs
    values:
      layout: page
      permalink: /:title/
  - scope:
      path: assets/img/favicons
    values:
      swcache: true
  - scope:
      path: assets/js/dist
    values:
      swcache: true

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - '*.gem'
  - '*.gemspec'
  - tools
  - README.md
  - LICENSE
  - gulpfile.js
  - node_modules
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

plugins:
  - jekyll-feed
  - jekyll-archives
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache
  - jekyll-paginate
